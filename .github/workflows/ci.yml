name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      # Test-environment values. Real keys live in Vercel's env panel
      # (see docs/PROVISIONING.md). The app must be import-safe with
      # placeholder values so unit tests can run without external creds.
      SECRET_KEY: ci-test-secret-not-for-production-not-for-production
      FASTHTML_SECRET_KEY: ci-fasthtml-secret-not-for-production
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      SKIP_MIGRATION_CHECK: "1"
      # Stub OpenRouter — get_ai_response degrades to a friendly
      # "not configured" message when this is unset, which the tests
      # for that path explicitly exercise.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check . || true  # informational only on first pass

      - name: Django system check
        run: python manage.py check

      - name: Verify migrations are in sync
        run: python manage.py makemigrations --check --dry-run

      - name: Run pytest
        run: pytest -q
